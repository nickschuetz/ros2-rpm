# Per-package configuration for scripts/generate-spec.py, Lyrical Luth (the
# 2026 LTS, ROS 2). Derived from distros/jazzy/packages.yaml by retargeting the
# gbp release URLs from release/jazzy to release/lyrical; upstream-archive
# entries are distro-agnostic and unchanged. See ADR 0012.
#
# Versions are resolved from each package's package.xml at generate time, so no
# version is pinned here. Publish the minimal ros-core / ros-base tier first.
#
ament_package:
  source_url: https://github.com/ament/ament_package/archive/refs/tags/{version}.tar.gz
  source_dir: ament_package-{version}

ament_cmake_core:
  source_url: https://github.com/ament/ament_cmake/archive/refs/tags/{version}.tar.gz
  source_dir: ament_cmake-{version}
  build_subdir: ament_cmake_core

# ament_cmake family, all share the same monorepo and tag.
ament_cmake:
  source_url: https://github.com/ament/ament_cmake/archive/refs/tags/{version}.tar.gz
  source_dir: ament_cmake-{version}
  build_subdir: ament_cmake

ament_cmake_export_definitions:
  source_url: https://github.com/ament/ament_cmake/archive/refs/tags/{version}.tar.gz
  source_dir: ament_cmake-{version}
  build_subdir: ament_cmake_export_definitions

ament_cmake_export_dependencies:
  source_url: https://github.com/ament/ament_cmake/archive/refs/tags/{version}.tar.gz
  source_dir: ament_cmake-{version}
  build_subdir: ament_cmake_export_dependencies

ament_cmake_export_include_directories:
  source_url: https://github.com/ament/ament_cmake/archive/refs/tags/{version}.tar.gz
  source_dir: ament_cmake-{version}
  build_subdir: ament_cmake_export_include_directories


ament_cmake_export_libraries:
  source_url: https://github.com/ament/ament_cmake/archive/refs/tags/{version}.tar.gz
  source_dir: ament_cmake-{version}
  build_subdir: ament_cmake_export_libraries

ament_cmake_export_link_flags:
  source_url: https://github.com/ament/ament_cmake/archive/refs/tags/{version}.tar.gz
  source_dir: ament_cmake-{version}
  build_subdir: ament_cmake_export_link_flags

ament_cmake_export_targets:
  source_url: https://github.com/ament/ament_cmake/archive/refs/tags/{version}.tar.gz
  source_dir: ament_cmake-{version}
  build_subdir: ament_cmake_export_targets

ament_cmake_gen_version_h:
  source_url: https://github.com/ament/ament_cmake/archive/refs/tags/{version}.tar.gz
  source_dir: ament_cmake-{version}
  build_subdir: ament_cmake_gen_version_h
  # Tests require ament_cmake_gtest which is not yet packaged; skip until the
  # test stack is in place.
  disable_tests: true

ament_cmake_include_directories:
  source_url: https://github.com/ament/ament_cmake/archive/refs/tags/{version}.tar.gz
  source_dir: ament_cmake-{version}
  build_subdir: ament_cmake_include_directories

ament_cmake_libraries:
  source_url: https://github.com/ament/ament_cmake/archive/refs/tags/{version}.tar.gz
  source_dir: ament_cmake-{version}
  build_subdir: ament_cmake_libraries

ament_cmake_python:
  source_url: https://github.com/ament/ament_cmake/archive/refs/tags/{version}.tar.gz
  source_dir: ament_cmake-{version}
  build_subdir: ament_cmake_python

ament_cmake_target_dependencies:
  source_url: https://github.com/ament/ament_cmake/archive/refs/tags/{version}.tar.gz
  source_dir: ament_cmake-{version}
  build_subdir: ament_cmake_target_dependencies

ament_cmake_test:
  source_url: https://github.com/ament/ament_cmake/archive/refs/tags/{version}.tar.gz
  source_dir: ament_cmake-{version}
  build_subdir: ament_cmake_test

ament_cmake_version:
  source_url: https://github.com/ament/ament_cmake/archive/refs/tags/{version}.tar.gz
  source_dir: ament_cmake-{version}
  build_subdir: ament_cmake_version

ament_cmake_gtest:
