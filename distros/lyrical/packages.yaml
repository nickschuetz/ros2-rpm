# fastrtps was renamed to fastdds in Lyrical (eProsima Fast DDS). gbp counter
# from rosdistro/lyrical (3.6.1-3). ament_cmake_export_interfaces was dropped;
# ament_cmake_export_targets (already listed above) is its successor.
fastdds:
  disable_tests: true
  noarch: false
  source_dir: fastdds-release-release-lyrical-fastdds-{version}-3
  source_url: https://github.com/ros2-gbp/fastdds-release/archive/refs/tags/release/lyrical/fastdds/{version}-3.tar.gz

# ament_cmake_ros repo split in Lyrical; ament_cmake_ros_core is a build dep of
# the rosidl typesupport packages. (domain_coordinator and rmw_test_fixture* from
# the same repo are test-infra, out of the minimal set.)
ament_cmake_ros_core:
  disable_tests: true
  source_dir: ament_cmake_ros-release-release-lyrical-ament_cmake_ros_core-{version}-1
  source_url: https://github.com/ros2-gbp/ament_cmake_ros-release/archive/refs/tags/release/lyrical/ament_cmake_ros_core/{version}-1.tar.gz

# rosidl repo added rosidl_buffer in Lyrical; rosidl_runtime_c build-depends on it.
rosidl_buffer:
  source_url: https://github.com/ros2/rosidl/archive/refs/tags/{version}.tar.gz
  source_dir: rosidl-{version}
  build_subdir: rosidl_buffer
  noarch: false
  disable_tests: true

# rosidl buffer subsystem, split into more packages in Lyrical; needed by the
# fastrtps typesupport packages.
rosidl_buffer_backend:
  source_url: https://github.com/ros2/rosidl/archive/refs/tags/{version}.tar.gz
  source_dir: rosidl-{version}
  build_subdir: rosidl_buffer_backend
  noarch: false
  disable_tests: true

# Required by rmw_fastrtps_shared_cpp (build_depend, find_package). Pulls in
# pluginlib for plugin-backend loading; pluginlib's deps (class_loader,
# ament_index_cpp, rcpputils, rcutils, system tinyxml2) are all in the set.
rosidl_buffer_backend_registry:
  source_url: https://github.com/ros2/rosidl/archive/refs/tags/{version}.tar.gz
  source_dir: rosidl-{version}
  build_subdir: rosidl_buffer_backend_registry
  noarch: false
  disable_tests: true

# Phase 2 (deferred): ships an arch Python extension under the rosidl_buffer
# namespace and is required by no minimal-set package. No spec generated.
rosidl_buffer_py:
  source_url: https://github.com/ros2/rosidl/archive/refs/tags/{version}.tar.gz
  source_dir: rosidl-{version}
  build_subdir: rosidl_buffer_py
  disable_tests: true
  phase2: true
