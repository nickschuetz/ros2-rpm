name: smoke-test

# Validates the published COPR contents on a fresh Fedora 44 container:
# Lyrical (flagship) from hellaenergy/ros2 and Jazzy (maintenance) from
# hellaenergy/ros2-jazzy. PRs that break either smoke test are blocked.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC, catches drift if upstream Fedora updates
    # something the COPR depends on between PRs.
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: smoke-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Smoke test ${{ matrix.distro }}, Fedora 44 (x86_64)
    runs-on: ubuntu-latest
    # Pull from registry.fedoraproject.org (reliable), not the bare docker.io
    # name, which intermittently times out on pull.
    container: registry.fedoraproject.org/fedora:44
    strategy:
      fail-fast: false
      matrix:
        include:
          # Flagship: Lyrical ships the minimal headless set, so the ros2cli /
          # demo_nodes / gazebo_msgs sections SKIP (expected).
          - distro: lyrical
            copr: hellaenergy/ros2
            packages: ros-lyrical-ros-base
          # Maintenance: Jazzy carries the full dev sandbox.
          - distro: jazzy
            copr: hellaenergy/ros2-jazzy
            packages: >-
              ros-jazzy-ros-base
              ros-jazzy-ros2cli
              ros-jazzy-ros2node
              ros-jazzy-ros2topic
              ros-jazzy-demo-nodes-cpp
              ros-jazzy-gazebo-msgs

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install COPR + ros-base + optional sub-packages
        # bash + sudo + dnf-plugins-core (for `dnf copr enable`) come from
        # core packages already in fedora:44, but we re-confirm rather than
        # assume.
        run: |
          dnf -y install dnf-plugins-core which procps-ng diffutils \
                         rpm-build cmake gcc gcc-c++ python3-devel \
                         findutils
          dnf copr enable -y ${{ matrix.copr }}
          dnf -y install ${{ matrix.packages }}

      - name: Run smoke test
        run: bash scripts/smoke-test.sh ${{ matrix.distro }} -v

  # We only run x86_64 against the COPRs in CI; aarch64 + Stream 10 are
  # exercised by the COPR build matrix itself. Adding them here would
  # quintuple CI time for marginal additional coverage given the build
  # matrix already gates publishing.
