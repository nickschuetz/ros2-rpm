name: smoke-test

# Validates the published COPR contents on a fresh Fedora 44 container:
# Lyrical (flagship) from hellaenergy/ros2 and Jazzy (maintenance) from
# hellaenergy/ros2-jazzy. PRs that break either smoke test are blocked.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC, catches drift if upstream Fedora updates
    # something the COPR depends on between PRs.
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: smoke-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Smoke test ${{ matrix.distro }}, Fedora 44 (x86_64)
    runs-on: ubuntu-latest
    # Pull from registry.fedoraproject.org (reliable), not the bare docker.io
    # name, which intermittently times out on pull.
    container: registry.fedoraproject.org/fedora:44
    strategy:
      fail-fast: false
      matrix:
        include:
          # Flagship: Lyrical ships the minimal headless set, so the ros2cli /
          # demo_nodes / gazebo_msgs sections SKIP (expected). Runtime is now
          # functional (rclpy.init / default rmw_fastrtps_cpp load verified after
          # foonathan_memory_vendor was fixed to install into lib/), so this is a
          # hard gate again.
          - distro: lyrical
            copr: hellaenergy/ros2
            packages: ros-lyrical-ros-base
          # Maintenance: Jazzy carries the full dev sandbox and is the hard gate.
          - distro: jazzy
            copr: hellaenergy/ros2-jazzy
            packages: >-
              ros-jazzy-ros-base
              ros-jazzy-ros2cli
              ros-jazzy-ros2node
              ros-jazzy-ros2topic
              ros-jazzy-demo-nodes-cpp
              ros-jazzy-gazebo-msgs

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install COPR + ros-base + optional sub-packages
        # bash + sudo + dnf-plugins-core (for `dnf copr enable`) come from
        # core packages already in fedora:44, but we re-confirm rather than
        # assume.
        run: |
          # The COPR download backend is intermittently slow; disable dnf's
          # "operation too slow" abort (minrate=0), give metadata fetches a
          # generous timeout, and retry the metadata-dependent commands so a
          # transient slow mirror does not fail the run (curl error 28 ->
          # "No match for argument").
          DNF_OPTS="--setopt=timeout=120 --setopt=minrate=0 --setopt=retries=10"
          retry() {
            local n=1 max=5
            until "$@"; do
              if [ "$n" -ge "$max" ]; then
                echo "::error::command failed after ${max} attempts: $*"
                return 1
              fi
              echo "attempt ${n}/${max} failed; retrying in $((n*15))s: $*"
              sleep $((n*15)); n=$((n+1))
            done
          }
          dnf -y $DNF_OPTS install dnf-plugins-core which procps-ng diffutils \
                         rpm-build cmake gcc gcc-c++ python3-devel \
                         findutils
          retry dnf copr enable -y ${{ matrix.copr }}
          retry dnf -y $DNF_OPTS --refresh install ${{ matrix.packages }}

      - name: Run smoke test
        run: bash scripts/smoke-test.sh ${{ matrix.distro }} -v

  # We only run x86_64 against the COPRs in CI; aarch64 + Stream 10 are
  # exercised by the COPR build matrix itself. Adding them here would
  # quintuple CI time for marginal additional coverage given the build
  # matrix already gates publishing.
